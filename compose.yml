services:
  caddy:
    image: caddy:2-alpine
    container_name: music-review-caddy
    restart: unless-stopped
    depends_on:
      - music-review
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  music-review:
    build:
      context: .
    container_name: music-review
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MUSIC_REVIEW_PROJECT_ROOT: /app
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data

  music-review-update:
    profiles:
      - jobs
    build:
      context: .
    env_file:
      - .env
    environment:
      MUSIC_REVIEW_PROJECT_ROOT: /app
      ARTIST_IMAGE_DOWNLOAD: "true"
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "music_review.pipeline.production_update", "-v"]

  music-review-artist-images:
    profiles:
      - jobs
    build:
      context: .
    env_file:
      - .env
    environment:
      MUSIC_REVIEW_PROJECT_ROOT: /app
      ARTIST_IMAGE_DOWNLOAD: "true"
      ARTIST_IMAGE_RESOLVE_ON_DEMAND: "true"
      USER_AGENT_APP: Plattenradar
      USER_AGENT_VERSION: "1.0"
      USER_AGENT_CONTACT: https://github.com/tomasito12/music-review
    volumes:
      - ./data:/app/data
    command:
      [
        "python",
        "-m",
        "music_review.pipeline.enrichment.artist_image_batch_cli",
        "--missing-only",
        "--all",
        "--download",
        "-v",
      ]

  music-review-metadata-refresh:
    profiles:
      - jobs
    build:
      context: .
    env_file:
      - .env
    environment:
      MUSIC_REVIEW_PROJECT_ROOT: /app
    volumes:
      - ./data:/app/data
    command:
      [
        "python",
        "-m",
        "music_review.pipeline.enrichment.fetch_metadata",
        "--update",
      ]

volumes:
  caddy_data:
  caddy_config:
