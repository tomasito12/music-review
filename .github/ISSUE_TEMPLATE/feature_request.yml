name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want to solve or the improvement you have in mind.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Python pipeline / scraper
        - MusicBrainz / metadata enrichment
        - Reference graph / communities
        - Recommendations / scoring
        - FastAPI backend
        - React frontend (Plattenradar)
        - Streamlit dashboard
        - CI / deployment / Docker
        - Documentation / developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What pain point or gap does this address?
      placeholder: As a user / maintainer, I want ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might this work? Sketches and examples are helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: dropdown
    id: data_dependency
    attributes:
      label: Does this need the full private `data/` corpus?
      options:
        - No — can be developed with fixtures/mocks
        - Partially — some local data helps
        - Yes — requires full production or local corpus
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this
          required: false
