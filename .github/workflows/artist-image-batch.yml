name: Artist image batch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to pull on the server before starting the job
        required: true
        default: main
      queue:
        description: Which artist queue to process
        required: true
        default: all
        type: choice
        options:
          - all
          - mbid
          - name

permissions:
  contents: read

concurrency:
  group: artist-image-batch-trigger
  cancel-in-progress: false

jobs:
  trigger:
    name: Start batch on server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

      - name: Pull branch and start detached batch job
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' \
            && git fetch --prune origin \
            && git checkout '${DEPLOY_BRANCH}' \
            && git pull --ff-only origin '${DEPLOY_BRANCH}' \
            && chmod +x scripts/start_artist_image_batch.sh \
            && ARTIST_IMAGE_QUEUE='${ARTIST_IMAGE_QUEUE}' scripts/start_artist_image_batch.sh"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ inputs.branch }}
          ARTIST_IMAGE_QUEUE: ${{ inputs.queue }}
