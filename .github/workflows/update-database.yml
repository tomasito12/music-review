name: Update database

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to pull on the server before starting the job
        required: true
        default: main
      metadata_update:
        description: Re-fetch MusicBrainz metadata for every review (--metadata-update)
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_reviews:
        description: Skip scraper step (only enrichment + graph)
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_graph_affinities:
        description: Skip graph rebuild and album affinities
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      recluster_communities:
        description: Re-run Louvain clustering (new community IDs)
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: update-database-trigger
  cancel-in-progress: false

jobs:
  trigger:
    name: Start update on server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

      - name: Pull branch and start detached database update
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' \
            && git fetch --prune origin \
            && git checkout '${DEPLOY_BRANCH}' \
            && git pull --ff-only origin '${DEPLOY_BRANCH}' \
            && chmod +x scripts/start_update_db.sh \
            && UPDATE_DB_METADATA_UPDATE='${UPDATE_DB_METADATA_UPDATE}' \
               UPDATE_DB_SKIP_REVIEWS='${UPDATE_DB_SKIP_REVIEWS}' \
               UPDATE_DB_SKIP_GRAPH_AFFINITIES='${UPDATE_DB_SKIP_GRAPH_AFFINITIES}' \
               UPDATE_DB_RECLUSTER_COMMUNITIES='${UPDATE_DB_RECLUSTER_COMMUNITIES}' \
               scripts/start_update_db.sh"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ inputs.branch }}
          UPDATE_DB_METADATA_UPDATE: ${{ inputs.metadata_update }}
          UPDATE_DB_SKIP_REVIEWS: ${{ inputs.skip_reviews }}
          UPDATE_DB_SKIP_GRAPH_AFFINITIES: ${{ inputs.skip_graph_affinities }}
          UPDATE_DB_RECLUSTER_COMMUNITIES: ${{ inputs.recluster_communities }}

      - name: Verify container started
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker ps --filter name=^music-review-update-db$ --format 'status={{.Status}}'"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
