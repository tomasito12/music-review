name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Hatch and uv
        run: python -m pip install --upgrade hatch uv

      - name: Use uv in Hatch
        run: hatch config set installer uv

      - name: Run lint and type checks
        run: hatch run lint:all

      - name: Run tests
        run: hatch run test:run

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build application image
        run: docker compose build music-review

      - name: Validate Compose config
        run: docker compose config --quiet
