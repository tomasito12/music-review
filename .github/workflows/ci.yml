name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Hatch and uv
        run: python -m pip install --upgrade hatch uv

      - name: Use uv in Hatch
        run: hatch config set installer uv

      - name: Run lint and type checks
        run: hatch run lint:all

      - name: Run tests
        run: hatch run test:run

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Run frontend unit tests
        run: hatch run frontend-install && hatch run frontend-test

  visual-screenshots:
    name: Visual regression screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - lint-test
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install screenshot fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-liberation fonts-dejavu-core

      - name: Install Hatch and uv
        run: python -m pip install --upgrade hatch uv

      - name: Use uv in Hatch
        run: hatch config set installer uv

      - name: Install frontend dependencies
        run: hatch run frontend-install

      - name: Install Playwright Chromium
        run: hatch run frontend-playwright-install

      - name: Regenerate reference screenshots on Linux
        run: hatch run frontend-screenshot-update

      - name: Sync visual reference PNGs
        env:
          CAN_PUSH: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          if git diff --quiet -- frontend/tests/visual/reference/; then
            echo "Visual references are up to date."
            exit 0
          fi
          if [ "$CAN_PUSH" != "true" ]; then
            echo "::error::Visual reference PNGs are stale on a fork PR. Run 'Update visual screenshots' on the base repository branch."
            git diff --stat -- frontend/tests/visual/reference/
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/tests/visual/reference/*.png
          git commit -m "chore: refresh visual reference screenshots for Linux CI"
          git push

      - name: Run visual regression tests
        run: hatch run frontend-screenshot-live

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create empty CI env file
        run: touch .env

      - name: Build production images
        run: docker compose build music-review frontend

      - name: Validate Compose config
        run: docker compose config --quiet
